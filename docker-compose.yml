# Design-system showcase, deployed as its own Swarm stack (agentage-ds) onto the
# shared traefik-public network. Distinct router/middleware names (ds-*) so it
# coexists with other stacks. Static SPA, env-agnostic - Traefik routes by host
# (${SITE_FQDN} = ds.agentage.io in prod, dev.ds.agentage.io in dev).
services:
  showcase:
    image: ghcr.io/agentage/design-system/showcase:${IMAGE_TAG}
    cap_drop:
      - ALL
    networks:
      - traefik-public
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.ds-https.rule=Host(`${SITE_FQDN}`)
        - traefik.http.routers.ds-https.entrypoints=https
        - traefik.http.routers.ds-https.tls=true
        - traefik.http.routers.ds-https.tls.certresolver=letsencrypt
        - traefik.http.routers.ds-https.middlewares=ds-secure-headers
        - traefik.http.services.ds.loadbalancer.server.port=8080
        - traefik.http.middlewares.ds-secure-headers.headers.stsSeconds=31536000
        - traefik.http.middlewares.ds-secure-headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.ds-secure-headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.ds-secure-headers.headers.customFrameOptionsValue=SAMEORIGIN
        - traefik.http.middlewares.ds-secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

networks:
  traefik-public:
    external: true
